name: CI / CD — Society Maintenance Agent

on:
  push:
    branches: [main, master]
    paths:
      - "society-agent/**"
      - ".github/workflows/society-agent.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "society-agent/**"

# Cancel any in-progress run for the same ref so only the latest matters
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/society-agent

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: society-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: society-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Lint (non-blocking style, blocking errors only) ──────────────────────
      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check . --select E,F --ignore E501
        continue-on-error: false

      # ── Unit + integration tests (no LLM — data & tool layer only) ──────────
      - name: Run data layer tests
        run: python test_data_loader.py
        env:
          PYTHONPATH: .

      - name: Run server / tools layer tests
        run: python test_server.py
        env:
          PYTHONPATH: .

      - name: Run report generation tests
        run: python test_e2e.py
        env:
          PYTHONPATH: .
          # Stub key so the import doesn't fail; agent LLM calls are not executed
          GROQ_API_KEY: stub_key_for_non_llm_tests

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & push Docker image (only on push to main/master)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only run on direct push (not PRs) and only on the default branch
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker metadata (tags + labels) ──────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true
            type=ref,event=branch

      # ── Set up QEMU + Buildx for multi-platform builds ───────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to GitHub Container Registry ────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: society-agent
          file: society-agent/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Print the pushed image digest for traceability ───────────────────────
      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy (placeholder — customise for your target environment)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: http://your-server-ip:8501    # update with your actual URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── SSH deploy to a remote server ─────────────────────────────────────────
      # Requires the following GitHub secrets to be configured:
      #   DEPLOY_HOST   — SSH host / IP of your server
      #   DEPLOY_USER   — SSH username  (e.g. ubuntu, ec2-user)
      #   DEPLOY_SSH_KEY — Private SSH key (paste the full PEM/RSA key)
      #   GROQ_API_KEY  — Groq API key injected into .env on the server
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # ── Pull latest image ────────────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # ── Ensure project directory & .env exist ────────────────────────
            mkdir -p ~/society-agent/data

            cat > ~/society-agent/.env <<'EOF'
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF

            # ── Write/update docker-compose on the server ────────────────────
            cp society-agent/docker-compose.yml ~/society-agent/docker-compose.yml

            # ── Restart with zero-downtime rolling update ────────────────────
            cd ~/society-agent
            docker compose pull
            docker compose up -d --remove-orphans

            # ── Prune dangling images ────────────────────────────────────────
            docker image prune -f
